name: CI Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Angular CLI
        run: npm install -g @angular/cli@15

      - name: Build Angular frontend
        working-directory: Web
        run: |
          npm install
          ng build --base-href /web/index.html --configuration production --build-optimizer

      - name: Copy frontend to SpringBoot resources
        run: |
          mkdir -p Code/src/main/resources/web
          cp -r Web/dist/web/* Code/src/main/resources/web/

      - name: Extract SQLite database
        working-directory: Code
        run: |
          sudo apt-get install -y p7zip-full
          7z x db.7z -aoa -osrc/main/resources/

      - name: Build with Maven
        working-directory: Code
        run: |
          chmod +x mvnw
          mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-download-jar
          path: Code/target/map-download.jar
          retention-days: 7
