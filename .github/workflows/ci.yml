name: CI Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  JBR_VERSION: "17.0.14"
  JBR_BUILD: "1367.22"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (JBR with JCEF)
        run: |
          JBR_FILE="jbrsdk_jcef-${JBR_VERSION}-linux-x64-b${JBR_BUILD}.tar.gz"
          JBR_URL="https://cache-redirector.jetbrains.com/intellij-jbr/${JBR_FILE}"
          echo "Downloading JBR from: $JBR_URL"
          curl -L --retry 3 --connect-timeout 30 -o /tmp/jbr.tar.gz "$JBR_URL"
          sudo mkdir -p /opt/jbr
          sudo tar xzf /tmp/jbr.tar.gz -C /opt/jbr --strip-components=1
          echo "JAVA_HOME=/opt/jbr" >> $GITHUB_ENV
          echo "/opt/jbr/bin" >> $GITHUB_PATH
          java -version

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Angular CLI
        run: npm install -g @angular/cli@15

      - name: Build Angular frontend
        working-directory: Web
        run: |
          npm install
          ng build --base-href /web/index.html --configuration production --build-optimizer

      - name: Copy frontend to SpringBoot resources
        run: |
          mkdir -p Code/src/main/resources/web
          cp -r Web/dist/web/* Code/src/main/resources/web/

      - name: Extract SQLite database
        working-directory: Code
        run: |
          sudo apt-get install -y p7zip-full
          7z x db.7z -aoa -osrc/main/resources/

      - name: Build with Maven
        working-directory: Code
        run: |
          chmod +x mvnw
          mvn clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-download-jar
          path: Code/target/map-download.jar
          retention-days: 7
